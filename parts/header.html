<div class="header__logo-container">
  <a href="/" class="header__logo">
    <img
      class="header__logo-icon"
      src="[theme_uri]/assets/images/logo.svg"
      alt="Europe-Evakuator Logo" />
    <span class="header__logo-text">[pll string="header_logo"]</span>
  </a>
</div>

<div class="header__nav-container">
  <nav class="header__nav">
    <ul class="header__nav-list">
      <li class="header__nav-item">
        <a href="/" class="header__nav-link">[pll string="menu_home"]</a>
      </li>
      <li class="header__nav-item">
        <a href="#rates" class="header__nav-link">[pll string="menu_rates"]</a>
      </li>
      <li class="header__nav-item">
        <a href="#services" class="header__nav-link">[pll string="menu_services"]</a>
      </li>

      <li class="header__nav-item">
        <a href="#gallery" class="header__nav-link">[pll string="menu_gallery"]</a>
      </li>

      <li class="header__nav-item">
        <a href="#faq" class="header__nav-link">[pll string="menu_faq"]</a>
      </li>
    </ul>
  </nav>
</div>

<div class="header__contact-container">
  <div class="header__contact-item-number">
    <i class="fas fa-phone header__contact-icon"></i>
    <a href='tel:[pll string="phone"]' class="header__contact-link"
      >[pll string="phone_view"]</a
    >
  </div>
  <div class="header__contact-item-email">
    <i class="fas fa-envelope header__contact-icon"></i>
    <a href='mailto:[pll string="email"]' class="header__contact-link"
      >[pll string="email"]</a
    >
  </div>
</div>

<div class="header__languages-container">[language_switcher]</div>
