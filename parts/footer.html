<div class="container">
  <div class="footer-container">
    <div class="footer__logo-container">
      <a href='tel:[pll string="phone"]' class="footer__logo">
        <img
          class="footer__logo-icon"
          src="[theme_uri]/assets/images/logo.svg"
          alt="Europe-Evakuator Logo" />
        <span>[pll string="phone_view"]</span>
      </a>
    </div>
    <div class="footer__social-container">
      <div class="social-item">
        <a href='tel:[pll string="phone"]' class="social-link">
          <i class="fas fa-phone"></i>
        </a>
      </div>
      <div class="social-item">
        <a href='https://t.me/[pll string="phone"]' class="social-link">
          <i class="fab fa-telegram"></i>
        </a>
      </div>
      <div class="social-item">
        <a href='https://wa.me/[pll string="phone"]' class="social-link">
          <i class="fab fa-whatsapp"></i>
        </a>
      </div>
    </div>
    <div class="footer__contact-container">
      <a href='tel:[pll string="phone"]' class="footer__contact-number"
        >[pll string="phone_view"]</a
      >
      <a href='mailto:[pll string="email"]' class="footer__contact-email"
        >[pll string="email"]</a
      >
    </div>
  </div>
</div>
